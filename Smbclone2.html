<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Mario Mobile Clone</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents double-tap zoom on mobile */
        }
        canvas {
            border: 4px solid #fff;
            background: #5c94fc; 
            max-width: 100%;
            height: auto;
        }
        /* Mobile Touch Controls Container */
        #mobileControls {
            display: none; /* Hidden on desktop, shown via media query */
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
        }
        .d-pad, .action-buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active {
            background: rgba(255, 255, 255, 0.6);
        }
        /* Media query to expose controls on touch-capable/smaller screens */
        @media (max-width: 900px), (pointer: coarse) {
            #mobileControls {
                display: flex;
            }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="480"></canvas>

<!-- Virtual Touch UI -->
<div id="mobileControls">
    <div class="d-pad">
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnRight">▶</div>
    </div>
    <div class="action-buttons">
        <div class="btn" id="btnJump" style="background: rgba(230, 0, 18, 0.4); border-color: #e60012;">A</div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

window.focus();

// Game Settings & Physics
const GRAVITY = 0.6;
const FRICTION = 0.85;

// Shared Keyboard / Touch Input State
const keys = { right: false, left: false, up: false };

const camera = { x: 0 };

const player = {
    x: 100,
    y: 300,
    width: 32,
    height: 48,
    vx: 0,
    vy: 0,
    speed: 5,
    jumpForce: 12,
    grounded: false,
    color: "#e60012"
};

const platforms = [
    { x: 0, y: 432, width: 1200, height: 48, type: 'ground' },
    { x: 1300, y: 432, width: 800, height: 48, type: 'ground' },
    { x: 200, y: 300, width: 32, height: 32, type: 'block' },
    { x: 264, y: 300, width: 32, height: 32, type: 'question' },
    { x: 296, y: 300, width: 32, height: 32, type: 'block' },
    { x: 328, y: 300, width: 32, height: 32, type: 'question' },
    { x: 360, y: 300, width: 32, height: 32, type: 'block' },
    { x: 296, y: 180, width: 32, height: 32, type: 'question' },
    { x: 600, y: 336, width: 64, height: 96, type: 'pipe' },
    { x: 900, y: 304, width: 64, height: 128, type: 'pipe' },
];

let coins = [
    { x: 272, y: 260, width: 16, height: 20, collected: false },
    { x: 336, y: 260, width: 16, height: 20, collected: false },
    { x: 304, y: 140, width: 16, height: 20, collected: false },
];

let enemies = [
    { x: 450, y: 400, width: 32, height: 32, vx: -1.5, color: "#c84c0c", alive: true },
    { x: 750, y: 400, width: 32, height: 32, vx: -1.5, color: "#c84c0c", alive: true },
    { x: 1500, y: 400, width: 32, height: 32, vx: -2, color: "#c84c0c", alive: true }
];

let score = 0;

// DESKTOP KEYBOARD INPUT
window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
    if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
    if (e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") {
        keys.up = true;
        e.preventDefault();
    }
});

window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
    if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
    if (e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") keys.up = false;
});

// MOBILE TOUCH INPUT
const bLeft = document.getElementById("btnLeft");
const bRight = document.getElementById("btnRight");
const bJump = document.getElementById("btnJump");

bLeft.addEventListener("touchstart", (e) => { e.preventDefault(); keys.left = true; });
bLeft.addEventListener("touchend", (e) => { e.preventDefault(); keys.left = false; });

bRight.addEventListener("touchstart", (e) => { e.preventDefault(); keys.right = true; });
bRight.addEventListener("touchend", (e) => { e.preventDefault(); keys.right = false; });

bJump.addEventListener("touchstart", (e) => { e.preventDefault(); keys.up = true; });
bJump.addEventListener("touchend", (e) => { e.preventDefault(); keys.up = false; });


function checkCollision(objA, objB) {
    return objA.x < objB.x + objB.width &&
           objA.x + objA.width > objB.x &&
           objA.y < objB.y + objB.height &&
           objA.y + objA.height > objB.y;
}

function update() {
    if (keys.right) player.vx < player.speed ? player.vx++ : player.vx = player.speed;
    if (keys.left) player.vx > -player.speed ? player.vx-- : player.vx = -player.speed;
    
    player.vx *= FRICTION;
    player.vy += GRAVITY;
    player.grounded = false;

    player.x += player.vx;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.vx > 0) player.x = plat.x - player.width;
            if (player.vx < 0) player.x = plat.x + plat.width;
        }
    }

    player.y += player.vy;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.vy > 0) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.grounded = true;
            } else if (player.vy < 0) {
                player.y = plat.y + plat.height;
                player.vy = 0;
            }
        }
    }

    if (keys.up && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    if (player.x > canvas.width / 2) {
        camera.x = player.x - canvas.width / 2;
    }

    if (player.y > canvas.height) {
        resetGame();
    }

    for (let coin of coins) {
        if (!coin.collected && checkCollision(player, coin)) {
            coin.collected = true;
            score += 100;
        }
    }

    for (let enemy of enemies) {
        if (!enemy.alive) continue;

        enemy.vy += GRAVITY;
        enemy.x += enemy.vx;

        for (let plat of platforms) {
            if (checkCollision(enemy, plat)) {
                if (enemy.vx > 0 && enemy.x + enemy.width > plat.x) enemy.vx *= -1;
                else if (enemy.vx < 0 && enemy.x < plat.x + plat.width) enemy.vx *= -1;
            }
        }

        if (checkCollision(player, enemy)) {
            if (player.vy > 0 && player.y + player.height - player.vy <= enemy.y + 12) {
                enemy.alive = false;
                player.vy = -player.jumpForce / 1.5;
                score += 200;
            } else {
                alert("Game Over! Try again.");
                resetGame();
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, 0);

    for (let plat of platforms) {
        if (plat.type === 'ground') ctx.fillStyle = "#d88038";
        else if (plat.type === 'block') ctx.fillStyle = "#b84418";
        else if (plat.type === 'question') ctx.fillStyle = "#fc9838";
        else if (plat.type === 'pipe') ctx.fillStyle = "#00a800";
        
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
    }

    ctx.fillStyle = "#fcf878";
    for (let coin of coins) {
        if (!coin.collected) {
            ctx.beginPath();
            ctx.ellipse(coin.x + coin.width/2, coin.y + coin.height/2, coin.width/2, coin.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }
    }

    for (let enemy of enemies) {
        if (enemy.alive) {
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            ctx.fillStyle = "#fff";
            ctx.fillRect(enemy.x + 4, enemy.y + 8, 6, 6);
            ctx.fillRect(enemy.x + 22, enemy.y + 8, 6, 6);
        }
    }

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = "#0020b8";
    ctx.fillRect(player.x + 4, player.y + 24, player.width - 8, player.height - 24);
    ctx.fillStyle = "#fce0a8";
    ctx.fillRect(player.x + 6, player.y + 6, player.width - 12, 14);
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, 6);

    ctx.restore();

    ctx.fillStyle = "#fff";
    ctx.font = "20px monospace";
    ctx.fillText(`MARIO   SCORE: ${score}`, 30, 40);
}

function resetGame() {
    player.x = 100;
    player.y = 300;
    player.vx = 0;
    player.vy = 0;
    camera.x = 0;
    score = 0;
    coins.forEach(c => c.collected = false);
    enemies.forEach((e, idx) => { 
        e.alive = true; 
        e.x = idx === 0 ? 450 : (idx === 1 ? 750 : 1500); 
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
